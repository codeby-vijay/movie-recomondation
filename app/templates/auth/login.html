{% extends "base.html" %}
{% block title %}Login - CineAI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in-up">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue to CineAI</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="username" class="form-label-dark">Username or Email</label>
                <input type="text" id="username" name="username" class="form-control-dark"
                       placeholder="Enter your username or email" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label-dark">Password</label>
                <input type="password" id="password" name="password" class="form-control-dark"
                       placeholder="Enter your password" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label text-secondary" for="remember" style="font-size: 0.85rem;">
                    Remember me
                </label>
            </div>
            <button type="submit" class="btn-cineai w-100 justify-content-center mb-3">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <p class="text-center text-secondary" style="font-size: 0.85rem;">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
